monitor = DP-1, 2560x1440@171, 0x0, 1
monitor = DP-2, 1920x1080@144, 2560x0, 1
monitor = , preferred, auto, 1

# Odd workspaces → DP-1 (main), even workspaces → DP-2 (secondary)
# When DP-2 is absent, Hyprland ignores monitor bindings and all workspaces land on DP-1
workspace = 1, monitor:DP-1, default:true
workspace = 3, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 7, monitor:DP-1
workspace = 9, monitor:DP-1
workspace = 2, monitor:DP-2, default:true
workspace = 4, monitor:DP-2
workspace = 6, monitor:DP-2
workspace = 8, monitor:DP-2
workspace = 10, monitor:DP-2
